##################################################################################################
# NAMESPACE & INSTRUMENTATION
##################################################################################################
apiVersion: v1
kind: Namespace
metadata:
  name: bookinfo
---
apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: bookinfo-instrumentation
  namespace: bookinfo
spec:
  exporter:
    # Dùng tên miền nội bộ chuẩn của K8s, không hardcode IP nữa cho "sạch"
    endpoint: http://otel-collector-opentelemetry-collector.lgtm.svc.cluster.local:4317
  sampler:
    type: always_on
---
##################################################################################################
# DETAILS SERVICE
##################################################################################################
apiVersion: v1
kind: Service
metadata:
  name: details
  namespace: bookinfo
  labels:
    app: details
    service: details
spec:
  ports:
  - port: 9080
    name: http
  selector:
    app: details
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bookinfo-details
  namespace: bookinfo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: details-v1
  namespace: bookinfo
  labels:
    app: details
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: details
      version: v1
  template:
    metadata:
      labels:
        app: details
        version: v1
    spec:
      serviceAccountName: bookinfo-details
      containers:
      - name: details
        image: docker.io/istio/examples-bookinfo-details-v1:1.20.2
        ports:
        - containerPort: 9080
        resources:
          requests: { cpu: "10m", memory: "64Mi" }
          limits: { cpu: "100m", memory: "128Mi" }
---
##################################################################################################
# RATINGS SERVICE
