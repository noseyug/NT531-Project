adminPassword: "${GRAFANA_PASSWORD}"

service:
  type: NodePort
  nodePort: 30000

# Load TELEGRAM_BOT_TOKEN và TELEGRAM_CHAT_ID từ secret
envFromSecret: grafana-telegram-secret

grafana.ini:
  alerting:
    enabled: false
  unified_alerting:
    enabled: true

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Mimir
        uid: mimir_uid
        type: prometheus
        url: http://mimir-gateway.lgtm.svc.cluster.local:80/prometheus
        access: proxy
        isDefault: true
        jsonData:
          exemplarTraceIdDestinations:
            - { datasourceUid: tempo_uid, name: traceID }

      - name: Tempo
        uid: tempo_uid
        type: tempo
        url: http://tempo.lgtm.svc.cluster.local:3200
        access: proxy
        jsonData:
          lokiSearch:      { datasourceUid: loki_uid }
          nodeGraph:       { enabled: true }
          serviceMap:      { datasourceUid: mimir_uid }
          tracesToMetrics:
            datasourceUid: mimir_uid
            tags:
              - { key: service.name, value: service }
          tracesToLogsV2:
            datasourceUid: loki_uid
            filterByTraceID: true
            filterBySpanID:  false
            spanStartTimeShift: -1m
            spanEndTimeShift:    1m
            tags:
              - { key: k8s.pod.name,       value: pod       }
              - { key: k8s.namespace.name,  value: namespace }

      - name: Loki
        uid: loki_uid
        type: loki
        url: http://loki.lgtm.svc.cluster.local:3100
        access: proxy
        jsonData:
          derivedFields:
            - { name: TraceID,       datasourceUid: tempo_uid, matcherRegex: '"traceId":"(\w+)"',  url: '${__value.raw}' }
            - { name: TraceID_alt,   datasourceUid: tempo_uid, matcherRegex: '"traceid":"(\w+)"',  url: '${__value.raw}' }
            - { name: TraceID_plain, datasourceUid: tempo_uid, matcherRegex: 'trace_id=(\w+)',      url: '${__value.raw}' }

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: Thesis-Dashboards
        orgId: 1
        folder: Performance Test
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

alerting:
  contactpoints.yaml:
    apiVersion: 1
    contactPoints:
      - name: Telegram
        orgId: 1
        receivers:
          - uid: telegram_1
            type: telegram
            settings:
              # Grafana load từ envFromSecret — KHÔNG phải shell variable
              bottoken: ${TELEGRAM_BOT_TOKEN}
              chatid:   ${TELEGRAM_CHAT_ID}

  policies.yaml:
    apiVersion: 1
    policies:
      - orgId: 1
        receiver: Telegram
        group_by: [alertname, namespace]
        group_wait:      30s
        group_interval:  5m
        repeat_interval: 1h
